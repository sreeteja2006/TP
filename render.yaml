databases:
  - name: tradepro-db
    databaseName: tradepro
    user: tradepro_user
    plan: free

services:
  - type: web
    name: trading-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 2 --timeout 120 web_app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: tradepro-db
          property: connectionString
    healthCheckPath: /health