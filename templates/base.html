<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="TradePro — Paper trading dashboard with live stock data, RSI signals, and ML price forecasting for Indian and US markets.">
    <title>{% block title %}TradePro{% endblock %} | TradePro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-graph-up-arrow"></i> TradePro
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                            <i class="bi bi-house-door-fill"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/dashboard' %}active{% endif %}" href="/dashboard">
                            <i class="bi bi-graph-up-arrow"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/trading' %}active{% endif %}" href="/trading">
                            <i class="bi bi-currency-exchange"></i> Trading
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path.startswith('/performance') %}active{% endif %}" href="/performance">
                            <i class="bi bi-bar-chart-fill"></i> Performance
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path.startswith('/symbols') %}active{% endif %}" href="/symbols">
                            <i class="bi bi-search"></i> Watchlist
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/system' %}active{% endif %}" href="/system">
                            <i class="bi bi-gear-fill"></i> System
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav align-items-center gap-1">
                    <li class="nav-item d-none d-md-flex align-items-center">
                        <span class="nav-link pe-none" style="font-size:0.8rem">
                            <span class="status-indicator status-online"></span>Live
                        </span>
                    </li>
                    <li class="nav-item">
                        <button id="darkModeToggle" class="btn btn-sm" title="Toggle dark mode"
                                style="background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2)">
                            <i class="bi bi-moon-fill" id="darkIcon"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4 animate__fadeIn">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-start mb-2 mb-md-0">
                    <strong><i class="bi bi-graph-up-arrow text-primary"></i> TradePro</strong>
                    <span class="text-muted ms-2" style="font-size:0.8rem">Paper trading &amp; ML forecasting</span>
                </div>
                <div class="col-md-6 text-md-end">
                    <span class="text-muted" style="font-size:0.8rem">© <span id="footerYear"></span> TradePro &mdash; For educational use only</span>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        document.getElementById('footerYear').textContent = new Date().getFullYear();

        const html = document.documentElement;
        const icon = document.getElementById('darkIcon');
        const btn  = document.getElementById('darkModeToggle');

        const saved = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', saved);
        icon.className = saved === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';

        btn.addEventListener('click', function () {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            icon.className = next === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
            localStorage.setItem('theme', next);
        });
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
